name: Build and Deploy Documentation

on:
  push:
    branches:
      - main # Runs whenever code is pushed or merged to main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install Sphinx, the theme, and your library
          pip install sphinx sphinx-rtd-theme
          pip install -e .

      - name: Generate API Documentation automatically
        # This scans src/numanalysislib and creates .rst files in docs/
        run: sphinx-apidoc -f -o docs/ src/numanalysislib

      - name: Build Sphinx HTML
        run: sphinx-build -b html docs/ docs/_build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/_build/html'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
